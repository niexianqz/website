<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niexian | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Dancing+Script:wght@700&family=Fira+Code&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }

        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        /* --- RAINBOW HEADER --- */
        .rainbow-container {
            font-size: clamp(3.5rem, 12vw, 7rem);
            font-weight: 800;
            letter-spacing: -3px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }

        .r-n { color: #ff3b30; }
        .r-i { color: #ff9500; }
        .r-e { color: #ffcc00; }
        .r-x { color: #4cd964; }
        .r-i2 { color: #007aff; }
        .r-a { color: #5856d6; }
        .r-n2 { color: #af52de; }

        /* --- MIDDLE SECTION --- */
        .star { color: #00ffcc; font-size: 1.8rem; margin-bottom: 10px; }

        .welcome-text {
            font-size: clamp(1.2rem, 4vw, 2rem);
            margin-bottom: 30px;
            font-weight: 400;
        }

        .nx-bold { font-weight: 800; }

        .dev-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 50px;
        }

        .brush-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 140%;
            height: 60px;
            background: rgba(30, 80, 180, 0.35);
            filter: blur(25px);
            z-index: -1;
            border-radius: 50px;
        }

        .dev-tag { color: #ff4d4d; font-size: 2.2rem; font-weight: bold; }
        .dev-name {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            margin-left: 15px;
        }

        /* --- GLOWING CODE WINDOW --- */
        .code-window {
            background: #111;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.1); /* White outer glow */
            border-radius: 12px;
            padding: 30px;
            width: 100%;
            max-width: 600px;
            margin-bottom: 60px;
        }

        .code-area {
            font-family: 'Fira Code', monospace;
            font-size: clamp(0.8rem, 2.5vw, 1rem);
            line-height: 1.8;
            text-align: left;
        }

        .line {
            display: block;
            width: 0;
            white-space: nowrap;
            overflow: hidden;
            border-right: 2px solid transparent;
        }

        /* Sequential Typing Animation */
        .line-1 { animation: typing 1s steps(30) 0.5s forwards, hideCursor 0.1s 1.5s forwards; }
        .line-2 { animation: typing 1s steps(30) 1.5s forwards, hideCursor 0.1s 2.5s forwards; }
        .line-3 { animation: typing 1.5s steps(40) 2.5s forwards, hideCursor 0.1s 4.0s forwards; }
        .line-4 { animation: typing 1.2s steps(35) 4.0s forwards, blinkCursor 0.8s infinite 5.2s; }

        @keyframes typing { 
            from { width: 0; border-right-color: #fff; } 
            to { width: 100%; border-right-color: #fff; } 
        }

        @keyframes hideCursor { to { border-right-color: transparent; } }

        @keyframes blinkCursor {
            0%, 100% { border-right-color: #fff; }
            50% { border-right-color: transparent; }
        }

        /* Syntax Highlighting */
        .c-yellow { color: #ffcc00; }
        .c-pink { color: #ff00ff; }
        .c-cyan { color: #00cccc; }
        .c-green { color: #a6e22e; }
        .c-gray { color: #75715e; }

        /* --- MINIMALIST FOOTER --- */
        .footer-minimal {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            color: #777;
            font-size: 0.8rem;
            padding-top: 30px;
            border-top: 1px solid #222;
            width: 100%;
            max-width: 1000px;
        }

        .footer-item {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: inherit;
            transition: color 0.3s ease;
        }

        .footer-item:hover { color: #ffffff; }

        .svg-icon { width: 15px; height: 15px; fill: currentColor; }
        .footer-label { font-weight: 500; }

    </style>
</head>
