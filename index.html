<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niexian | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Dancing+Script:wght@700&family=Fira+Code&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }

        body {
            background-color: #0d0d0d;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        /* --- RAINBOW HEADER --- */
        .rainbow-container {
            font-size: clamp(3.5rem, 12vw, 7rem);
            font-weight: 800;
            letter-spacing: -3px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
        }

        .r-n { color: #ff3b30; }
        .r-i { color: #ff9500; }
        .r-e { color: #ffcc00; }
        .r-x { color: #4cd964; }
        .r-i2 { color: #007aff; }
        .r-a { color: #5856d6; }
        .r-n2 { color: #af52de; }

        .cursor-main {
            color: #ffffff;
            margin-left: 10px;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        /* --- MIDDLE SECTION --- */
        .star { color: #00ffcc; font-size: 1.8rem; margin-bottom: 10px; }

        .welcome-text {
            font-size: clamp(1.2rem, 4vw, 2.2rem);
            margin-bottom: 30px;
            font-weight: 400;
        }

        .nx-bold { font-weight: 800; }

        .dev-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 50px;
        }

        .brush-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 140%;
            height: 70px;
            background: rgba(30, 80, 180, 0.4);
            filter: blur(20px);
            z-index: -1;
            border-radius: 50px;
        }

        .dev-tag { color: #ff4d4d; font-size: 2.2rem; font-weight: bold; }
        .dev-name {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            margin-left: 15px;
        }

        /* --- TYPING ANIMATION SECTION --- */
        .code-area {
            font-family: 'Fira Code', monospace;
            font-size: clamp(0.85rem, 2.5vw, 1.05rem);
            line-height: 2;
            text-align: left;
            margin-bottom: 60px;
        }

        .line {
            display: block;
            width: 0;
            white-space: nowrap;
            overflow: hidden;
            border-right: 2px solid transparent;
        }

        .line-1 { animation: typing 1s steps(30) 0.5s forwards, hideCursor 0.1s 1.5s forwards; }
        .line-2 { animation: typing 1s steps(30) 1.5s forwards, hideCursor 0.1s 2.5s forwards; }
        .line-3 { animation: typing 1.5s steps(40) 2.5s forwards, hideCursor 0.1s 4.0s forwards; }
        .line-4 { animation: typing 1.2s steps(35) 4.0s forwards, showCursor 0.1s 4.0s forwards; }

        @keyframes typing { from { width: 0; border-right-color: #fff; } to { width: 100%; border-right-color: #fff; } }
        @keyframes hideCursor { to { border-right-color: transparent; } }
        @keyframes showCursor { to { border-right-color: #fff; } }

        .c-yellow { color: #ffcc00; }
        .c-pink { color: #ff00ff; }
        .c-cyan { color: #00cccc; }
        .c-green { color: #a6e22e; }
        .c-gray { color: #75715e; }

        /* --- MINIMALIST FOOTER --- */
        .footer-minimal {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            color: #888;
            font-size: 0.85rem;
            padding-top: 30px;
            border-top: 1px solid #222;
            width: 100%;
            max-width: 1000px;
        }

        .footer-item {
            display: flex;
            align-items: center;
            gap: 10px;
            transition: color 0.3s;
        }

        .footer-item:hover { color: #fff; }

        .svg-icon {
            width: 16px;
            height: 16px;
            fill: currentColor;
            opacity: 0.8;
        }

        .footer-label { font-weight: 500; letter-spacing: 0.5px; }

    </style>
</head>
<body>

    <div class="rainbow-container">
        <span class="r-n">n</span><span class="r-i">i</span><span class="r-e">e</span><span class="r-x">x</span><span class="r-i2">i</span><span class="r-a">a</span><span class="r-n2">n</span>
        <span class="cursor-main">|</span>
    </div>

    <div class="star">✦</div>

    <div class="welcome-text">
        Welcome to the <span class="nx-bold">NX.</span> website.
    </div>

    <div class="dev-wrapper">
        <div class="brush-bg"></div>
        <span class="dev-tag">Dev.</span>
        <span class="dev-name">Niexian</span>
    </div>

    <div class="code-area">
        <span class="line line-1"><span class="c-yellow">this_page</span>.<span class="c-pink">home</span> = <span class="c-yellow">true</span>;</span>
        <span class="line line-2"><span class="c-yellow">if</span> (<span class="c-cyan">page_niexian</span>) <span class="c-yellow">niexian_home</span>();</span>
        <span class="line line-3"><span class="c-yellow">else</span> <span class="c-pink">console</span>.<span class="c-pink">log</span>(<span class="c-green">"Welcome to the NX. website."</span>);</span>
        <span class="line line-4"><span class="c-yellow">window</span>.<span class="c-pink">location</span> = <span class="c-gray">"https://niexian.site";</span></span>
    </div>

            <span class="footer-label">Javascript & NodeJS</span>
        </div>
        <div class="footer-item">
            <svg class="svg-icon" viewBox="0 0 24 24"><path d="M21 2H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h7l-2 3v1h8v-1l-2-3h7c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 12H3V4h18v10z"/></svg>
            <span class="footer-label">Full FrontEnd</span>
        </div>
        <div class="footer-item">
            <svg class="svg-icon" viewBox="0 0 24 24"><path d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/></svg>

        </div>
    </div>

</body>
</html>
