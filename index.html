<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>niexian website</title>
  <style>
    /* Center the content on the screen */
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #1a1a1a; /* Dark sleek background */
      margin: 0;
      font-family: 'Courier New', Courier, monospace;
    }

    /* Container for the rainbow text */
    #typing-text {
      font-size: 4rem;
      font-weight: bold;
      position: relative;
    }

    /* Blinking cursor effect */
    #typing-text::after {
      content: '|';
      color: #ffffff; /* White cursor */
      position: absolute;
      margin-left: 8px;
      animation: blink 0.8s step-end infinite;
    }

    @keyframes blink {
      from, to { opacity: 0; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>

  <div id="typing-text"></div>

  <script>
    const textToType = "niexian";
    const typingSpeed = 150; // Speed in milliseconds
    
    // Rainbow color palette
    const rainbowColors = [
      '#FF0000', // Red
      '#FF7F00', // Orange
      '#FFFF00', // Yellow
      '#00FF00', // Green
      '#0000FF', // Blue
      '#4B0082', // Indigo
      '#9400D3'  // Violet
    ];
    
    let i = 0;
    const textElement = document.getElementById("typing-text");

    function typeWriterRainbow() {
      if (i < textToType.length) {
        const char = textToType.charAt(i);
        const color = rainbowColors[i % rainbowColors.length];
        
        // Wrap each character in a span with a specific color
        textElement.innerHTML += `<span style="color:${color}">${char}</span>`;
        
        i++;
        setTimeout(typeWriterRainbow, typingSpeed);
      }
    }

    // Start the effect after a short delay
    window.onload = () => {
      setTimeout(typeWriterRainbow, 500); 
    };
  </script>

</body>
</html>
